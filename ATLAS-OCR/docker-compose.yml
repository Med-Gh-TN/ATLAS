name: omni-architect

# ════════════════════════════════════════════════════════════════════════════
# Omni-Architect — Enterprise Infrastructure Stack
# ════════════════════════════════════════════════════════════════════════════
#
# Services
# ────────
#   qdrant    — Vector DB (ColBERT MaxSim retrieval)       Port 6333/6334
#   postgres  — Relational source of truth (Doc UUIDs)     Port 5432
#   redis     — In-memory KV cache (LightRAG + LLM cache)  Port 6379
#   neo4j     — Enterprise graph DB (KG entities/rels)     Port 7474/7687
#
# Startup order
# ─────────────
# Application startup depends on all four services. Use healthcheck-based
# depends_on in your application's service definition.
#
# Memory limits (Assumes 32 GB host)
# ─────────────
#   Qdrant  : 8 GB (ColBERT 128-dim vectors)
#   Postgres: 2 GB (Metadata only)
#   Redis   : 4 GB (LightRAG KV chunks + LLM cache)
#   Neo4j   : 8 GB (KG heap + page cache)
# ════════════════════════════════════════════════════════════════════════════

services:

  # ── VECTOR DATABASE ───────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_master_db
    restart: unless-stopped
    ports:
      - "6333:6333"  # HTTP REST + gRPC
      - "6334:6334"  # gRPC (direct)
    environment:
      QDRANT__SERVICE__MAX_REQUEST_SIZE_MB: 50
    volumes:
      - qdrant_storage:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 8G
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── RELATIONAL SOURCE OF TRUTH ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: omni_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: omni_architect
      POSTGRES_USER: omni
      # ⚠ Replace this with a secret manager value in production.
      # Never commit a real password to source control.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omni_secret_change_me}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    command: >
      postgres
      -c max_connections=100
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=128MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=4MB
      -c min_wal_size=1GB
      -c max_wal_size=4GB
      -c log_min_duration_statement=1000
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omni -d omni_architect"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── IN-MEMORY KV CACHE ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: omni_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 3gb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --appendonly no
      --tcp-keepalive 60
      --loglevel notice
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ── ENTERPRISE GRAPH DATABASE ─────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: omni_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"  # HTTP Browser UI
      - "7687:7687"  # Bolt protocol (Python driver)
    environment:
      # ⚠ Replace with secret manager value in production.
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-omni_neo4j_change_me}
      NEO4J_server_memory_heap_initial__size: "1G"
      NEO4J_server_memory_heap_max__size: "2G"
      NEO4J_server_memory_pagecache_size: "4G"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
      NEO4J_server_bolt_enabled: "true"
      NEO4J_server_http_enabled: "true"
      NEO4J_db_tx__log_rotation_retention__policy: "2 days"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    deploy:
      resources:
        limits:
          memory: 8G
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:7474 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── MANAGEMENT UIs ────────────────────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: omni_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  redisinsight:
    image: redis/redisinsight:latest
    container_name: omni_redisinsight
    restart: unless-stopped
    ports:
      - "8001:5540"
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G

# ════════════════════════════════════════════════════════════════════════════
# NAMED VOLUMES
# ════════════════════════════════════════════════════════════════════════════
volumes:
  qdrant_storage:
    name: omni_architect_qdrant_storage
  postgres_data:
    name: omni_architect_postgres_data
  redis_data:
    name: omni_architect_redis_data
  neo4j_data:
    name: omni_architect_neo4j_data
  neo4j_logs:
    name: omni_architect_neo4j_logs
  neo4j_import:
    name: omni_architect_neo4j_import
  neo4j_plugins:
    name: omni_architect_neo4j_plugins