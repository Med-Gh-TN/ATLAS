services:
  api:
    build:
      context: ..
      dockerfile: backend/docker/api.Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://atlas_user:atlas_password@db:5432/atlas_db
      REDIS_URL: redis://redis:6379/0
      REDIS_CACHE_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      SECRET_KEY: change-me
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minio_admin
      MINIO_SECRET_KEY: minio_password
      MINIO_BUCKET_NAME: atlas-documents
      MINIO_SECURE: "False"
      FRONTEND_ORIGIN: http://localhost:3000
      FRONTEND_ORIGIN_ROOT: https://atlas.tn
      FRONTEND_ORIGIN_WWW: https://www.atlas.tn
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - qdrant
      - minio

  worker:
    build:
      context: ..
      dockerfile: backend/docker/worker.Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://atlas_user:atlas_password@db:5432/atlas_db
      REDIS_URL: redis://redis:6379/0
      REDIS_CACHE_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      SECRET_KEY: change-me
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minio_admin
      MINIO_SECRET_KEY: minio_password
      MINIO_BUCKET_NAME: atlas-documents
      MINIO_SECURE: "False"
    depends_on:
      - db
      - redis
      - minio

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: atlas_user
      POSTGRES_PASSWORD: atlas_password
      POSTGRES_DB: atlas_db
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
