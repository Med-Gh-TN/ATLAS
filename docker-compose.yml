version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16 
    environment:
      POSTGRES_USER: atlas_user
      POSTGRES_PASSWORD: atlas_password
      POSTGRES_DB: atlas_db
    ports:
      - "5433:5432"
    volumes:
      - atlas_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas_user -d atlas_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password
      # DEFENSIVE ARCHITECTURE: US-24 Server-Side Encryption (SSE-KMS)
      # Format: <key-name>:<base64-encoded-32-byte-key>
      MINIO_KMS_SECRET_KEY: "minio-encryption-key:N3VlcmEwdjFiejNkaXJ0YW1hZ2ljc3RyaW5nbW9yZXM="
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - atlas_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # DEFENSIVE ARCHITECTURE: US-24 Antivirus Scanner
  clamav:
    image: clamav/clamav:latest
    ports:
      - "3310:3310"
    restart: always
    healthcheck:
      test: ["CMD", "clamdscan", "--ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine # Satisfies Redis 7 requirement
    ports:
      - "6379:6379"
    volumes:
      - atlas_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # US-09: MeiliSearch Full-Text & Typo-Tolerant Engine
  meilisearch:
    image: getmeili/meilisearch:v1.6
    environment:
      MEILI_MASTER_KEY: meili_master_key
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - atlas_meili_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  atlas_postgres_data:
  atlas_minio_data:
  atlas_redis_data:
  atlas_meili_data: