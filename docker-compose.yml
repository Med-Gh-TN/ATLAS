
version: "3.9"

services:
  db:
    image: ankane/pgvector:v0.4.4 # Use pgvector image directly
    environment:
      POSTGRES_USER: atlas_user
      POSTGRES_PASSWORD: atlas_password
      POSTGRES_DB: atlas_db
    ports:
      - "5433:5432"
    volumes:
      - atlas_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas_user -d atlas_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - atlas_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - atlas_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Uncomment in later sprints
  # meilisearch:
  #   image: getmeili/meilisearch:v1.6
  #   environment:
  #     MEILI_MASTER_KEY: meili_master_key
  #   ports:
  #     - "7700:7700"
  #   volumes:
  #     - atlas_meili_data:/meili_data

volumes:
  atlas_postgres_data:
  atlas_minio_data:
  atlas_redis_data:
  # atlas_meili_data:
