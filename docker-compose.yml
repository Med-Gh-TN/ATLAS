services:
  db:
    image: postgres:16-alpine 
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-atlas_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atlas_password}
      POSTGRES_DB: ${POSTGRES_DB:-atlas_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    command: >
      postgres
      -c max_connections=100
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=128MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
    ports:
      - "5433:5432"
    volumes:
      - atlas_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atlas_user} -d ${POSTGRES_DB:-atlas_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 3gb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --appendonly no
    volumes:
      - atlas_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    environment:
      QDRANT__SERVICE__MAX_REQUEST_SIZE_MB: 50
    volumes:
      - atlas_qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-atlas_neo4j_secret}
      NEO4J_server_memory_heap_initial__size: "1G"
      NEO4J_server_memory_heap_max__size: "2G"
      NEO4J_server_memory_pagecache_size: "4G"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    volumes:
      - atlas_neo4j_data:/data
      - atlas_neo4j_logs:/logs
      - atlas_neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:7474 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.5
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-atlas_meili_master_key_change_me}
      MEILI_ENV: ${MEILI_ENV:-development}
      MEILI_DB_PATH: /meili_data
    volumes:
      - atlas_meili_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/docker/api.Dockerfile
    ports:
      - "8000:8000"
    
    env_file:
      - ./backend/.env
      - ./ATLAS-OCR/.env

    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-atlas_user}:${POSTGRES_PASSWORD:-atlas_password}@db:5432/${POSTGRES_DB:-atlas_db}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:3000}
      
      - PYTHONPATH=/app:/omni/src:/omni/RAG-Anything
      - ENTERPRISE_STORAGE_ENABLED=true
      
      - REDIS_URL=redis://redis:6379/0
      - REDIS_CACHE_URL=redis://redis:6379/1
      - REDIS_URI=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-atlas_neo4j_secret}
      - POSTGRES_URI=postgresql://${POSTGRES_USER:-atlas_user}:${POSTGRES_PASSWORD:-atlas_password}@db:5432/${POSTGRES_DB:-atlas_db}

      # Meilisearch
      - MEILISEARCH_URL=http://meilisearch:7700
      - MEILISEARCH_API_KEY=${MEILI_MASTER_KEY:-atlas_meili_master_key_change_me}
      
      # ── [SOTA FIX]: Route all HuggingFace/Model downloads to our persistent volume
      - HF_HOME=/omni/cache/huggingface
      - DOCLING_NUM_THREADS=1

    volumes:
      - ./backend:/app
      - ./ATLAS-OCR/src:/omni/src
      - ./ATLAS-OCR/RAG-Anything:/omni/RAG-Anything
      - atlas_omni_workspace:/omni/workspace
      # ── [SOTA FIX]: Persistent volume so models survive container death
      - atlas_model_cache:/omni/cache
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  atlas_postgres_data:
  atlas_redis_data:
  atlas_qdrant_data:
  atlas_neo4j_data:
  atlas_neo4j_logs:
  atlas_neo4j_plugins:
  atlas_omni_workspace:
  atlas_model_cache:
  atlas_meili_data: